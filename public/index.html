<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>MS 2026 — Tipovačka</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<div class="app">
  <div class="header">
    <div class="header-badge">⚽ FIFA WORLD CUP 2026</div>
    <h1>Tipovačka MS 2026</h1>
  </div>

  <div id="login-screen">
    <div class="login-wrap">
      <div class="login-card">
        <h2>Vítej! 👋</h2>
        <p>Zadej své jméno pro přihlášení nebo registraci.</p>
        <div class="input-wrap"><input type="text" id="name-input" placeholder="Tvoje jméno..." maxlength="24" /></div>
        <button class="btn-primary" onclick="login()">Vstoupit do tipovačky →</button>
        <p class="hint">Nové jméno = nový účet automaticky</p>
      </div>
    </div>
  </div>

  <div id="main-screen" style="display:none">
    <div class="user-bar">
      <div class="avatar" id="u-avatar">?</div>
      <div style="flex:1">
        <div class="user-name" id="u-name"></div>
        <div class="user-pts" id="u-pts">0 bodů</div>
      </div>
      <button class="btn-sm" onclick="logout()">Odhlásit</button>
    </div>

    <div class="nav">
      <button class="nav-btn active" onclick="showTab('tips',this)">Tipovat</button>
      <button class="nav-btn" onclick="showTab('mytips',this)">Moje tipy</button>
      <button class="nav-btn" onclick="showTab('lb',this)">Tabulka</button>
    </div>

    <div id="tab-tips" class="tab active">
      <div class="sync-bar">
        <button class="btn-sm" onclick="syncResults()"><span id="sync-icon">↻</span> Aktualizovat výsledky</button>
        <span class="sync-info" id="sync-info">Naposledy: nikdy</span>
      </div>
      <div class="champion-card">
        <h3>🏆 Kdo vyhraje šampionát?</h3>
        <p>Tip na šampióna přinese <strong>+20 bodů</strong> na konci turnaje.</p>
        <div id="champion-picker-wrap"></div>
      </div>
      <div id="tips-container"><div class="loading">⏳ Načítám zápasy...</div></div>
    </div>

    <div id="tab-mytips" class="tab"><div id="mytips-container"></div></div>
    <div id="tab-lb" class="tab"><div id="lb-container"></div></div>
  </div>
</div>
<div class="toast" id="toast"></div>
<script src="app.js"></script>
</body>
</html>
